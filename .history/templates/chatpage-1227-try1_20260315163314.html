    <!-- 根据上一个页面选择的人物不同加载不同的数据和人物图片 -->
    <script>
        // 定义一个函数，用于获取url中的查询参数，即获取1/2/3的card号码
        function getQueryParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        //定义一个函数，根据不同的card号码加载不同的数据和图片
        document.addEventListener('DOMContentLoaded', function () {
            const cardNumber = getQueryParameter('card');//获取url中的查询参数
            const imageElement = document.getElementById('character-image');//加载图片
            const characterData = characters[cardNumber];//加载数据

            if (characterData) {
                // 填充基本信息
                document.querySelector('#gender span:last-child').textContent = characterData['basic-information'].gender;
                document.querySelector('#age span:last-child').textContent = characterData['basic-information'].age;
                document.querySelector('#occupation span:last-child').textContent = characterData['basic-information'].occupation;
                document.querySelector('#address span:last-child').textContent = characterData['basic-information'].address;

                // 填充属性信息
                document.querySelector('#str span:first-child').textContent = characterData.attribute.str;
                document.querySelector('#dex span:first-child').textContent = characterData.attribute.dex;
                document.querySelector('#luk span:first-child').textContent = characterData.attribute.luk;
                document.querySelector('#int span:first-child').textContent = characterData.attribute.int;

                // 填充技能信息
                document.querySelector('#inspect span:last-child').textContent = characterData.skill.inspect;
                document.querySelector('#psychology span:last-child').textContent = characterData.skill.psychology;
                document.querySelector('#social span:last-child').textContent = characterData.skill.social;
                document.querySelector('#run span:last-child').textContent = characterData.skill.run;
                document.querySelector('#library-use span:last-child').textContent = characterData.skill['library-use'];
                document.querySelector('#credit span:last-child').textContent = characterData.skill.credit;

                updateLightSpots(characterData.attribute);
                // 填充属性信息并更新light-spot位置
                function updateLightSpots(attribute) {
                    // 更新str光点位置
                    var strValue = parseInt(attribute.str, 10);
                    var strBar = document.getElementById('str-bar-1');
                    var strbarWidth = strBar.clientWidth;
                    var strlightSpot = document.getElementById('str-light-spot');
                    var strlightSpotPosition = (strValue / 100) * strbarWidth;
                    strlightSpot.style.left = strlightSpotPosition + 'px';
                    strlightSpot.style.display = 'block';
                    // 更新dex光点位置
                    var dexValue = parseInt(attribute.dex, 10);
                    var dexBar = document.getElementById('dex-bar-1');
                    var dexbarWidth = dexBar.clientWidth;
                    var dexlightSpot = document.getElementById('dex-light-spot');
                    var dexlightSpotPosition = (dexValue / 100) * dexbarWidth;
                    dexlightSpot.style.left = dexlightSpotPosition + 'px';
                    dexlightSpot.style.display = 'block';
                    // 更新luk光点位置
                    var lukValue = parseInt(attribute.luk, 10);
                    var lukBar = document.getElementById('luk-bar-1');
                    var lukbarWidth = lukBar.clientWidth;
                    var luklightSpot = document.getElementById('luk-light-spot');
                    var luklightSpotPosition = (lukValue / 100) * lukbarWidth;
                    luklightSpot.style.left = luklightSpotPosition + 'px';
                    luklightSpot.style.display = 'block';
                    // 更新int光点位置
                    var intValue = parseInt(attribute.int, 10);
                    var intBar = document.getElementById('int-bar-1');
                    var intbarWidth = intBar.clientWidth;
                    var intlightSpot = document.getElementById('int-light-spot');
                    var intlightSpotPosition = (intValue / 100) * intbarWidth;
                    intlightSpot.style.left = intlightSpotPosition + 'px';
                    intlightSpot.style.display = 'block';

                // 设置人物图片
                const imageElement = document.getElementById('character-image');
                switch (cardNumber) {

                        break;

                        break;

                        break;
                    default:

                }
            } else {
                console.error('未找到对应卡片的数据');
            }
        });

    <!-- 以下是对话的页面 -->
    <script>
        // 创建一个函数来发送 /gamestart 请求
        function triggerGameStart() {
            fetch('/gamestart')
                .then(response => response.json())
                .then(data => {
                    // 假设您想要在聊天日志中显示欢迎消息
                    displayMessage('ai', data.message);

                    // 延迟 1 秒后显示 "对话1"
                    setTimeout(() => {
                        displayMessage('ai', '这个小镇可不太平，你最好小心点。');
                        // 延迟 1 秒后显示 "对话2"
                    }, 1000);
                })
                .catch(error => {
                    console.error('Error fetching game start message:', error);
                    displayMessage('error', 'Failed to fetch game start message.');
                });
        }

        // 页面加载完成后自动调用 triggerGameStart 函数
        document.addEventListener('DOMContentLoaded', function () {
            triggerGameStart();
        });

        //创建sendmessage函数
        function sendMessage() {
            const question = document.getElementById('question').value;//获取用户输入的问题的文本内容
            if (question.trim()) {//使用trim()方法去除字符串两端的空白字符
                displayMessage('user', question);//调用displayMessage函数显示用户消息

                fetch('/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question: question })
                })
                    .then(response => response.json())
                    .then(data => {
                        setTimeout(() => {
                            displayMessage('ai', data.answer);
                        }, 1000);//延迟1秒后调用displayMessage函数显示AI的回复，延迟一秒是为了模拟ai的响应时间
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        displayMessage('error', 'Failed to send message.');
                    });

                // Clear the input field
                document.getElementById('question').value = ''; //将输入框内的文本内容清空，以便用户可以继续发送新的消息
            }
        }

        //创建displayMessage函数，用于在聊天界面中显示消息
        function displayMessage(type, message) {
            const chatLogs = document.getElementById('chat-logs');//获取聊天日志的容器元素
            const messageContainer = document.createElement('div');//创建一个新的div元素，用于包含消息内容和样式信息
            messageContainer.className = 'message-container message ' + type;//设置消息容器的类名，以便应用相应的样式信息

            const messageText = document.createElement('div');//创建一个新的div元素，用于包含消息文本内容
            messageText.className = 'message-text';//设置消息文本的类名，以便应用相应的样式信息
            messageText.textContent = message;//设置消息文本的内容为传入的message参数值

            messageContainer.appendChild(messageText);//将消息文本元素添加到消息容器中
            chatLogs.appendChild(messageContainer);//将消息容器添加到聊天日志的容器中，以便显示在聊天界面中

            // 检查 answer 是否为特定的句子
            if (message === '哈哈，你很快就会知道的，跟随我的指引来吧。') {
                setTimeout(() => {
                    displayMessage('ai', '进入交涉鉴定，罗拉，请你投掷骰子。');
                    setTimeout(() => {
                        displayMessage('ai', '你投出了5点，成功进入酒馆。');
                    }, 1000);
                }, 1000);
            }
            if (message === '嗯，那天晚上，他抱着一本书走向公墓，月光洒在他身上，像个吟游诗人。') {
                setTimeout(() => {
                    displayMessage('ai', '你离开了邻居莱拉·奥戴尔，进入墓地寻找线索，与看守梅洛迪亚斯·杰弗逊交流。【进入信任鉴定，请玩家投掷骰子。】');
                }, 1000);
            }

            chatLogs.scrollTop = chatLogs.scrollHeight; //将滚动条自动移动到聊天日志的底部，以便用户可以看到最新的消息
        }
    </script>

    <!-- 语音识别功能 -->
    <script>
        // 获取语音按钮和文本元素
        const voiceButton = document.getElementById('voice-button');
        const voiceButtonText = document.getElementById('voice-button-text');

        // 检查浏览器是否支持 Web Speech API
        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.continuous = false; // 设置为 false，表示只识别一次
            recognition.interimResults = false; // 设置为 false，表示只返回最终结果
            recognition.lang = 'zh-CN'; // 设置识别语言为中文

            //储存初始按钮的文本和样式，以便在语音识别结束后恢复
            const initialButtonText = voiceButtonText.textContent;
            const initialButtonStyles = voiceButton.style.cssText;

            // 当用户点击语音按钮时开始语音识别
            voiceButton.addEventListener('click', function () {
                voiceButtonText.textContent = '语音识别中...'; // 更改按钮文本
                voiceButton.style.backgroundColor = '#F4A579'; // 更改按钮背景颜色
                voiceButton.style.color = '#000'; // 更改按钮文本颜色（如果需要的话）
                recognition.start();
            });

            // 当语音识别有结果时触发
            recognition.onresult = function (event) {
                const transcript = event.results[0][0].transcript; // 获取识别结果
                document.getElementById('question').value = transcript; // 将识别结果填入输入框
                sendMessage(); // 自动发送消息
            };

            // 当语音识别出错时触发
            recognition.onerror = function (event) {
                console.error('语音识别错误:', event.error);
                displayMessage('error', '语音识别失败，请重试。');
                voiceButtonText.textContent = initialButtonText;
                voiceButton.style.cssText = initialButtonStyles;
            };

            // 当语音识别结束时触发
            recognition.onend = function () {
                console.log('语音识别结束');
                voiceButtonText.textContent = initialButtonText;
                voiceButton.style.cssText = initialButtonStyles;
            };
        } else {
            console.error('浏览器不支持 Web Speech API');
            displayMessage('error', '您的浏览器不支持语音识别功能。');
        }
    </script>

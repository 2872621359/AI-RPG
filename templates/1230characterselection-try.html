<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-demo-characterselection</title>
    <link rel="stylesheet" href="../css/1230characterselection-try.css">
</head>

<body>
    <div id="screen-background">
        <div id="title-all">
            <svg id="line1-title-all" ;xmlns="http://www.w3.org/2000/svg" width="487" height="13" viewBox="0 0 687 13"
                fill="none">
                <path d="M686.773 6.5L681 0.726497L675.227 6.5L681 12.2735L686.773 6.5ZM0 7.5H681V5.5H0V7.5Z"
                    fill="#828282" />
            </svg>

            <svg id="line2-title-all" ;xmlns="http://www.w3.org/2000/svg" width="487" height="13" viewBox="0 0 687 13"
                fill="none">
                <path d="M0.226497 6L6 11.7735L11.7735 6L6 0.226497L0.226497 6ZM6 7H687V5H6V7Z" fill="#828282" />
            </svg>

            <p id="characterselection-title">请选择你的人物卡</p>
        </div>

        <div id="charactercard-all">
            <img id="card1" src="../images/charactercard1.png" alt="charactercard card1">
            <img id="card2" src="../images/charactercard2.png" alt="charactercard card2">
            <img id="card3" src="../images/charactercard3.png" alt="charactercard card3">
        </div>

        <!-- 选择不同的卡片，跳转到下一个页面加载不同的数据和本地图片 -->
        <script>
            var card1 = document.getElementById("card1");
            var card2 = document.getElementById("card2");
            var card3 = document.getElementById("card3");
            card1.onclick = function () {
                window.location.href = "/chatpage?card=1";
            }

            card2.onclick = function () {
                window.location.href = "/chatpage?card=2";
            }

            card3.onclick = function () {
                window.location.href = "/chatpage?card=3";
            }
        </script>
</body>

</html>
